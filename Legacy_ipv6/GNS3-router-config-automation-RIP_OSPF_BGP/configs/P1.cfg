hostname P1
!
ip cef

mpls label protocol ldp
mpls ldp router-id Loopback0 force

!

interface Loopback0
 no ip address
 ip address 10.255.0.2 255.255.255.255

 ip ospf 1 area 0

!

interface GigabitEthernet1/0
 no ip address

 ip address 172.16.0.2 255.255.255.252

 ip ospf 1 area 0


 mpls ip

 no shutdown
!

interface GigabitEthernet2/0
 no ip address

 ip address 172.16.0.5 255.255.255.252

 ip ospf 1 area 0


 mpls ip

 no shutdown
!

interface GigabitEthernet3/0
 no ip address

 ip address 172.16.0.18 255.255.255.252

 ip ospf 1 area 0


 mpls ip

 no shutdown
!


router ospf 1
 router-id 10.255.0.2
 passive-interface Loopback0
!


router bgp 65000
 bgp router-id 10.255.0.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

 neighbor 10.255.0.3 remote-as 65000
 neighbor 10.255.0.3 description RR_VPNV4_to_P2
 neighbor 10.255.0.3 update-source Loopback0

 neighbor 10.255.0.5 remote-as 65000
 neighbor 10.255.0.5 description RR_VPNV4_to_P3
 neighbor 10.255.0.5 update-source Loopback0

 neighbor 10.255.0.1 remote-as 65000
 neighbor 10.255.0.1 description RR_VPNV4_to_PE1
 neighbor 10.255.0.1 update-source Loopback0

 neighbor 10.255.0.4 remote-as 65000
 neighbor 10.255.0.4 description RR_VPNV4_to_PE2
 neighbor 10.255.0.4 update-source Loopback0

 !
 address-family vpnv4

	neighbor 10.255.0.3 activate
	neighbor 10.255.0.3 send-community extended


	neighbor 10.255.0.5 activate
	neighbor 10.255.0.5 send-community extended


	neighbor 10.255.0.1 activate
	neighbor 10.255.0.1 send-community extended

	neighbor 10.255.0.1 route-reflector-client


	neighbor 10.255.0.4 activate
	neighbor 10.255.0.4 send-community extended

	neighbor 10.255.0.4 route-reflector-client


 exit-address-family

!


!
end
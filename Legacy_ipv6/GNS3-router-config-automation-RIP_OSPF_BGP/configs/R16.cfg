hostname R16
!
ip unicast-routing
ip cef
!
interface Loopback0
 no ip address
 ip address 10.255.4.16 255.255.255.255
 ip ospf 1 area 0
!

interface FastEthernet0/0
 no ip address
 ip address 192.168.9.16 255.255.255.0
 
 no shutdown
!

interface GigabitEthernet1/0
 no ip address
 ip address 192.168.11.16 255.255.255.0
 
 no shutdown
!

!
router ospf 1
 router-id 16.16.16.16
 passive-interface Loopback0
 
 redistribute bgp 4 route-map BGP_TO_OSPF subnets
 
!
router bgp 4
 bgp router-id 16.16.16.16
 bgp log-neighbor-changes
 !
 
 neighbor 192.168.9.15 remote-as 3
 neighbor 192.168.9.15 description to_R15_peer
 
 
 neighbor 192.168.11.17 remote-as 5
 neighbor 192.168.11.17 description to_R17_peer
 
 
 !
 address-family ipv4
 
  neighbor 192.168.9.15 activate
  
  
 
  neighbor 192.168.11.17 activate
  
  
 
 
  ! Networks to advertise
  
  network 192.168.11.0/24
  
  network 192.168.9.0/24
  
 
  network 10.255.4.16 mask 255.255.255.255
  redistribute connected
  
  redistribute ospf 1 route-map OSPF_TO_BGP
  
 exit-address-family
!

! Route-map to tag BGP routes redist into OSPF
route-map BGP_TO_OSPF permit 10
 set tag 4
!
! Route-map to filter OSPF routes (deny tagged routes)
route-map OSPF_TO_BGP deny 10
 match tag 4
!
route-map OSPF_TO_BGP permit 20
!


end
write memory
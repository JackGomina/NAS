hostname R16
!
ip unicast-routing
ip cef
!
interface Loopback0
 no ip address
 ip address 10.255.3.1 255.255.255.255
 ip ospf 1 area 0
!

interface FastEthernet0/0
 no ip address
 ip address 172.31.0.14 255.255.255.252
 
 no shutdown
!

interface GigabitEthernet1/0
 no ip address
 ip address 172.31.0.17 255.255.255.252
 
 no shutdown
!

!
router ospf 1
 router-id 16.16.16.16
 passive-interface Loopback0
 
 redistribute bgp 4 subnets
 
!
router bgp 4
 bgp router-id 16.16.16.16
 bgp log-neighbor-changes
 !
 
 neighbor 172.31.0.13 remote-as 3
 neighbor 172.31.0.13 description to_R15_peer
 
 
 neighbor 172.31.0.18 remote-as 5
 neighbor 172.31.0.18 description to_R17_peer
 
 
 !
 address-family ipv4
 
  neighbor 172.31.0.13 activate
  
  
 
  neighbor 172.31.0.18 activate
  
  
 
 
  ! Networks to advertise
  
    network 172.31.0.12 mask 255.255.255.252
  
    network 172.31.0.16 mask 255.255.255.252
  
 
  network 10.255.3.1 mask 255.255.255.255
  redistribute connected
  
  redistribute ospf 1
  
 exit-address-family
!


end
write memory
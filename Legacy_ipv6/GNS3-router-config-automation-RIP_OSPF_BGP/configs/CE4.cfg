hostname CE4
!
ip cef

!

interface Loopback0
 no ip address
 ip address 10.255.1.2 255.255.255.255

!

interface FastEthernet0/0
 no ip address

 ip address 172.31.0.13 255.255.255.252


 no shutdown
!




router bgp 65100
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

 neighbor 172.31.0.14 remote-as 65000
 neighbor 172.31.0.14 description CE_to_PE2

 !
 address-family ipv4

	neighbor 172.31.0.14 activate


	network 10.255.1.2 mask 255.255.255.255

 exit-address-family
!

!
end
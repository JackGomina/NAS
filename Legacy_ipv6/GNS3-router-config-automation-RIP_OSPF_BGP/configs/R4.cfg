hostname R4
!
ip unicast-routing
ip cef

mpls label protocol ldp
mpls ldp router-id Loopback0 force

!
interface Loopback0
 no ip address
 ip address 10.255.0.4 255.255.255.255

 ip ospf 1 area 0

!

interface GigabitEthernet3/0
 no ip address
 ip address 172.16.0.10 255.255.255.252

 ip ospf 1 area 0


 mpls ip

 no shutdown
!

interface FastEthernet0/0
 no ip address
 ip address 172.31.0.5 255.255.255.252

 ip ospf 1 area 0


 no shutdown
!


router ospf 1
 router-id 4.4.4.4
 passive-interface Loopback0
!

write memory
hostname R2
!
ip unicast-routing
ip cef
!
interface Loopback0
 no ip address
 ip address 10.255.0.2 255.255.255.255
 ip ospf 1 area 0
!

interface GigabitEthernet1/0
 no ip address
 ip address 172.16.0.2 255.255.255.252
 
 ip ospf 1 area 0
 
 
 no shutdown
!

interface GigabitEthernet2/0
 no ip address
 ip address 172.16.0.5 255.255.255.252
 
 ip ospf 1 area 0
 
 
 no shutdown
!

interface GigabitEthernet3/0
 no ip address
 ip address 172.16.0.38 255.255.255.252
 
 ip ospf 1 area 0
 
 
 no shutdown
!

interface FastEthernet0/0
 no ip address
 ip address 172.31.0.9 255.255.255.252
 
 no shutdown
!

!
router ospf 1
 router-id 2.2.2.2
 passive-interface Loopback0
 
 redistribute bgp 1 subnets
 
!
router bgp 1
 bgp router-id 2.2.2.2
 bgp log-neighbor-changes
 !
 
 neighbor 172.31.0.10 remote-as 3
 neighbor 172.31.0.10 description to_R15_peer
 
 
 neighbor 10.255.0.1 remote-as 1
 neighbor 10.255.0.1 description to_R1_peer
 
 neighbor 10.255.0.1 update-source Loopback0
 
 
 neighbor 10.255.0.3 remote-as 1
 neighbor 10.255.0.3 description to_R3_peer
 
 neighbor 10.255.0.3 update-source Loopback0
 
 
 neighbor 10.255.0.4 remote-as 1
 neighbor 10.255.0.4 description to_R4_peer
 
 neighbor 10.255.0.4 update-source Loopback0
 
 
 neighbor 10.255.0.5 remote-as 1
 neighbor 10.255.0.5 description to_R6_peer
 
 neighbor 10.255.0.5 update-source Loopback0
 
 
 neighbor 10.255.0.6 remote-as 1
 neighbor 10.255.0.6 description to_R5_peer
 
 neighbor 10.255.0.6 update-source Loopback0
 
 
 neighbor 10.255.0.7 remote-as 1
 neighbor 10.255.0.7 description to_R8_peer
 
 neighbor 10.255.0.7 update-source Loopback0
 
 
 !
 address-family ipv4
 
  neighbor 172.31.0.10 activate
  
  
 
  neighbor 10.255.0.1 activate
  
  neighbor 10.255.0.1 next-hop-self
  
  
 
  neighbor 10.255.0.3 activate
  
  neighbor 10.255.0.3 next-hop-self
  
  
 
  neighbor 10.255.0.4 activate
  
  neighbor 10.255.0.4 next-hop-self
  
  
 
  neighbor 10.255.0.5 activate
  
  neighbor 10.255.0.5 next-hop-self
  
  
 
  neighbor 10.255.0.6 activate
  
  neighbor 10.255.0.6 next-hop-self
  
  
 
  neighbor 10.255.0.7 activate
  
  neighbor 10.255.0.7 next-hop-self
  
  
 
 
  ! Networks to advertise
  
    network 172.16.0.0 mask 255.255.255.252
  
    network 172.16.0.36 mask 255.255.255.252
  
    network 172.16.0.4 mask 255.255.255.252
  
    network 172.31.0.8 mask 255.255.255.252
  
 
  network 10.255.0.2 mask 255.255.255.255
  redistribute connected
  
  redistribute ospf 1
  
 exit-address-family
!


end
write memory
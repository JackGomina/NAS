hostname PE2
!
ip cef

mpls label protocol ldp
mpls ldp router-id Loopback0 force

!
interface Loopback0
 no ip address
 ip address 10.255.1.4 255.255.255.255

 ip ospf 1 area 0

!

interface GigabitEthernet3/0
 no ip address
 ip address 172.16.1.10 255.255.255.252

 ip ospf 1 area 0


 mpls ip

 no shutdown
!

interface FastEthernet0/0
 no ip address
 ip address 172.31.0.5 255.255.255.252

 ip ospf 1 area 0


 no shutdown
!

interface GigabitEthernet1/0
 no ip address
 ip address 172.31.0.14 255.255.255.252

 ip ospf 1 area 0


 no shutdown
!


router ospf 1
 router-id 10.255.1.4
 passive-interface Loopback0
!


router bgp 2
 bgp router-id 10.255.1.4
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

 neighbor 10.255.1.6 remote-as 2
 neighbor 10.255.1.6 description RR_VPNV4_to_P4
 neighbor 10.255.1.6 update-source Loopback0

 !
 address-family vpnv4

	neighbor 10.255.1.6 activate
	neighbor 10.255.1.6 send-community both


 exit-address-family
!

!
end
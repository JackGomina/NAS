hostname R15
!
ip unicast-routing
ip cef
!
interface Loopback0
 no ip address
 ip address 10.255.3.15 255.255.255.255
 ip ospf 1 area 0
!

interface FastEthernet0/0
 no ip address
 ip address 192.168.6.15 255.255.255.0
 
 no shutdown
!

interface GigabitEthernet1/0
 no ip address
 ip address 192.168.9.15 255.255.255.0
 
 no shutdown
!

!
router ospf 1
 router-id 15.15.15.15
 passive-interface Loopback0
 
 redistribute bgp 3 route-map BGP_TO_OSPF subnets
 
!
router bgp 3
 bgp router-id 15.15.15.15
 bgp log-neighbor-changes
 !
 
 neighbor 192.168.6.2 remote-as 1
 neighbor 192.168.6.2 description to_R2_peer
 
 
 neighbor 192.168.9.16 remote-as 4
 neighbor 192.168.9.16 description to_R16_peer
 
 
 !
 address-family ipv4
 
  neighbor 192.168.6.2 activate
  
  
 
  neighbor 192.168.9.16 activate
  
  
 
 
  ! Networks to advertise
  
  network 192.168.6.0/24
  
  network 192.168.9.0/24
  
 
  network 10.255.3.15 mask 255.255.255.255
  redistribute connected
  
  redistribute ospf 1 route-map OSPF_TO_BGP
  
 exit-address-family
!

! Route-map to tag BGP routes redist into OSPF
route-map BGP_TO_OSPF permit 10
 set tag 3
!
! Route-map to filter OSPF routes (deny tagged routes)
route-map OSPF_TO_BGP deny 10
 match tag 3
!
route-map OSPF_TO_BGP permit 20
!


end
write memory
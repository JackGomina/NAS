hostname RR2
!
ip cef

mpls label protocol ldp
mpls ldp router-id Loopback0 force

!
interface Loopback0
 no ip address
 ip address 10.255.2.6 255.255.255.255

 ip ospf 1 area 0

!

interface FastEthernet0/0
 no ip address
 ip address 172.16.2.14 255.255.255.252

 ip ospf 1 area 0


 mpls ip

 no shutdown
!

interface GigabitEthernet1/0
 no ip address
 ip address 172.16.2.21 255.255.255.252

 ip ospf 1 area 0


 mpls ip

 no shutdown
!


router ospf 1
 router-id 10.255.2.6
 passive-interface Loopback0
!


router bgp 3
 bgp router-id 10.255.2.6
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

 neighbor 10.255.2.5 remote-as 3
 neighbor 10.255.2.5 description RR_VPNV4_to_RR1
 neighbor 10.255.2.5 update-source Loopback0

 neighbor 10.255.2.1 remote-as 3
 neighbor 10.255.2.1 description RR_VPNV4_to_PE1
 neighbor 10.255.2.1 update-source Loopback0

 neighbor 10.255.2.4 remote-as 3
 neighbor 10.255.2.4 description RR_VPNV4_to_PE2
 neighbor 10.255.2.4 update-source Loopback0

 !
 address-family vpnv4

	neighbor 10.255.2.5 activate
	neighbor 10.255.2.5 send-community both


	neighbor 10.255.2.1 activate
	neighbor 10.255.2.1 send-community both

	neighbor 10.255.2.1 route-reflector-client


	neighbor 10.255.2.4 activate
	neighbor 10.255.2.4 send-community both

	neighbor 10.255.2.4 route-reflector-client


 exit-address-family
!

!
end
hostname R1
!
ip unicast-routing
ip cef
!
interface Loopback0
 no ip address
 ip address 10.255.1.1 255.255.255.255
 ip ospf 1 area 0
!

interface GigabitEthernet1/0
 no ip address
 ip address 172.16.0.1 255.255.255.252
 
 ip ospf 1 area 0
 
 
 no shutdown
!

interface GigabitEthernet2/0
 no ip address
 ip address 172.16.0.13 255.255.255.252
 
 ip ospf 1 area 0
 
 
 no shutdown
!

!
router ospf 1
 router-id 1.1.1.1
 passive-interface Loopback0
 
 redistribute bgp 1 route-map BGP_TO_OSPF subnets
 
!
router bgp 1
 bgp router-id 1.1.1.1
 bgp log-neighbor-changes
 !
 
 neighbor 10.255.1.2 remote-as 1
 neighbor 10.255.1.2 description to_R2_peer
 
 neighbor 10.255.1.2 update-source Loopback0
 
 
 neighbor 10.255.1.3 remote-as 1
 neighbor 10.255.1.3 description to_R3_peer
 
 neighbor 10.255.1.3 update-source Loopback0
 
 
 neighbor 10.255.1.4 remote-as 1
 neighbor 10.255.1.4 description to_R4_peer
 
 neighbor 10.255.1.4 update-source Loopback0
 
 
 neighbor 10.255.1.6 remote-as 1
 neighbor 10.255.1.6 description to_R6_peer
 
 neighbor 10.255.1.6 update-source Loopback0
 
 
 neighbor 10.255.1.5 remote-as 1
 neighbor 10.255.1.5 description to_R5_peer
 
 neighbor 10.255.1.5 update-source Loopback0
 
 
 neighbor 10.255.1.8 remote-as 1
 neighbor 10.255.1.8 description to_R8_peer
 
 neighbor 10.255.1.8 update-source Loopback0
 
 
 !
 address-family ipv4
 
  neighbor 10.255.1.2 activate
  
  neighbor 10.255.1.2 next-hop-self
  
  
 
  neighbor 10.255.1.3 activate
  
  neighbor 10.255.1.3 next-hop-self
  
  
 
  neighbor 10.255.1.4 activate
  
  neighbor 10.255.1.4 next-hop-self
  
  
 
  neighbor 10.255.1.6 activate
  
  neighbor 10.255.1.6 next-hop-self
  
  
 
  neighbor 10.255.1.5 activate
  
  neighbor 10.255.1.5 next-hop-self
  
  
 
  neighbor 10.255.1.8 activate
  
  neighbor 10.255.1.8 next-hop-self
  
  
 
 
  ! Networks to advertise
  
  network 172.16.0.0/30
  
  network 172.16.0.12/30
  
 
  network 10.255.1.1 mask 255.255.255.255
  redistribute connected
  
  redistribute ospf 1 route-map OSPF_TO_BGP
  
 exit-address-family
!

! Route-map to tag BGP routes redist into OSPF
route-map BGP_TO_OSPF permit 10
 set tag 1
!
! Route-map to filter OSPF routes (deny tagged routes)
route-map OSPF_TO_BGP deny 10
 match tag 1
!
route-map OSPF_TO_BGP permit 20
!


end
write memory
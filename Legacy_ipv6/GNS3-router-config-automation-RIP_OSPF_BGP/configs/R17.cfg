hostname R17
!
ip unicast-routing
ip cef
!
interface Loopback0
 no ip address
 ip address 10.255.5.17 255.255.255.255
 ip ospf 1 area 0
!

interface FastEthernet0/0
 no ip address
 ip address 172.31.0.18 255.255.255.252
 
 no shutdown
!

interface GigabitEthernet1/0
 no ip address
 ip address 172.31.0.21 255.255.255.252
 
 no shutdown
!

!
router ospf 1
 router-id 17.17.17.17
 passive-interface Loopback0
 
 redistribute bgp 5 route-map BGP_TO_OSPF subnets
 
!
router bgp 5
 bgp router-id 17.17.17.17
 bgp log-neighbor-changes
 !
 
 neighbor 172.31.0.17 remote-as 4
 neighbor 172.31.0.17 description to_R16_peer
 
 
 neighbor 172.31.0.22 remote-as 2
 neighbor 172.31.0.22 description to_R11_peer
 
 
 !
 address-family ipv4
 
  neighbor 172.31.0.17 activate
  
  
 
  neighbor 172.31.0.22 activate
  
  
 
 
  ! Networks to advertise
  
  network 172.31.0.16/30
  
  network 172.31.0.20/30
  
 
  network 10.255.5.17 mask 255.255.255.255
  redistribute connected
  
  redistribute ospf 1 route-map OSPF_TO_BGP
  
 exit-address-family
!

! Route-map to tag BGP routes redist into OSPF
route-map BGP_TO_OSPF permit 10
 set tag 5
!
! Route-map to filter OSPF routes (deny tagged routes)
route-map OSPF_TO_BGP deny 10
 match tag 5
!
route-map OSPF_TO_BGP permit 20
!


end
write memory
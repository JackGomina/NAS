hostname R17
!
ip unicast-routing
ip cef
!
interface Loopback0
 no ip address
 ip address 10.255.5.17 255.255.255.255
 ip ospf 1 area 0
!

interface FastEthernet0/0
 no ip address
 ip address 192.168.11.17 255.255.255.0
 
 no shutdown
!

interface GigabitEthernet1/0
 no ip address
 ip address 192.168.9.17 255.255.255.0
 
 no shutdown
!

!
router ospf 1
 router-id 17.17.17.17
 passive-interface Loopback0
 
 redistribute bgp 5 route-map BGP_TO_OSPF subnets
 
!
router bgp 5
 bgp router-id 17.17.17.17
 bgp log-neighbor-changes
 !
 
 neighbor 192.168.11.16 remote-as 4
 neighbor 192.168.11.16 description to_R16_peer
 
 
 neighbor 192.168.9.11 remote-as 2
 neighbor 192.168.9.11 description to_R11_peer
 
 
 !
 address-family ipv4
 
  neighbor 192.168.11.16 activate
  
  
 
  neighbor 192.168.9.11 activate
  
  
 
 
  ! Networks to advertise
  
  network 192.168.11.0/24
  
  network 192.168.9.0/24
  
 
  network 10.255.5.17 mask 255.255.255.255
  redistribute connected
  
  redistribute ospf 1 route-map OSPF_TO_BGP
  
 exit-address-family
!

! Route-map to tag BGP routes redist into OSPF
route-map BGP_TO_OSPF permit 10
 set tag 5
!
! Route-map to filter OSPF routes (deny tagged routes)
route-map OSPF_TO_BGP deny 10
 match tag 5
!
route-map OSPF_TO_BGP permit 20
!


end
write memory
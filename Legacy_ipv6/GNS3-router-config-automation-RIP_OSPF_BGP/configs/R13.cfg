hostname R13
!
ip unicast-routing
ip cef
!
interface Loopback0
 no ip address
 ip address 10.255.1.6 255.255.255.255
 ip ospf 1 area 0
!

interface GigabitEthernet2/0
 no ip address
 ip address 172.16.1.14 255.255.255.252
 
 ip ospf 1 area 0
 
 
 no shutdown
!

interface GigabitEthernet1/0
 no ip address
 ip address 172.16.1.17 255.255.255.252
 
 ip ospf 1 area 0
 
 
 no shutdown
!

interface GigabitEthernet3/0
 no ip address
 ip address 172.16.1.38 255.255.255.252
 
 ip ospf 1 area 0
 
 
 no shutdown
!

!
router ospf 1
 router-id 13.13.13.13
 passive-interface Loopback0
 
 redistribute bgp 2 subnets
 
!
router bgp 2
 bgp router-id 13.13.13.13
 bgp log-neighbor-changes
 !
 
 neighbor 10.255.1.1 remote-as 2
 neighbor 10.255.1.1 description to_R7_peer
 
 neighbor 10.255.1.1 update-source Loopback0
 
 
 neighbor 10.255.1.2 remote-as 2
 neighbor 10.255.1.2 description to_R9_peer
 
 neighbor 10.255.1.2 update-source Loopback0
 
 
 neighbor 10.255.1.3 remote-as 2
 neighbor 10.255.1.3 description to_R10_peer
 
 neighbor 10.255.1.3 update-source Loopback0
 
 
 neighbor 10.255.1.4 remote-as 2
 neighbor 10.255.1.4 description to_R11_peer
 
 neighbor 10.255.1.4 update-source Loopback0
 
 
 neighbor 10.255.1.5 remote-as 2
 neighbor 10.255.1.5 description to_R12_peer
 
 neighbor 10.255.1.5 update-source Loopback0
 
 
 neighbor 10.255.1.7 remote-as 2
 neighbor 10.255.1.7 description to_R14_peer
 
 neighbor 10.255.1.7 update-source Loopback0
 
 
 !
 address-family ipv4
 
  neighbor 10.255.1.1 activate
  
  neighbor 10.255.1.1 next-hop-self
  
  
 
  neighbor 10.255.1.2 activate
  
  neighbor 10.255.1.2 next-hop-self
  
  
 
  neighbor 10.255.1.3 activate
  
  neighbor 10.255.1.3 next-hop-self
  
  
 
  neighbor 10.255.1.4 activate
  
  neighbor 10.255.1.4 next-hop-self
  
  
 
  neighbor 10.255.1.5 activate
  
  neighbor 10.255.1.5 next-hop-self
  
  
 
  neighbor 10.255.1.7 activate
  
  neighbor 10.255.1.7 next-hop-self
  
  
 
 
  ! Networks to advertise
  
    network 172.16.1.12 mask 255.255.255.252
  
    network 172.16.1.16 mask 255.255.255.252
  
    network 172.16.1.36 mask 255.255.255.252
  
 
  network 10.255.1.6 mask 255.255.255.255
  redistribute connected
  
  redistribute ospf 1
  
 exit-address-family
!


end
write memory
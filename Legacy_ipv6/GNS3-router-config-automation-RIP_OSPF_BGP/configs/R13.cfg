hostname R13
!
ip unicast-routing
ip cef
!
interface Loopback0
 no ip address
 ip address 10.255.2.13 255.255.255.255
 ip ospf 1 area 0
!

interface GigabitEthernet2/0
 no ip address
 ip address 10.2.13.2 255.255.255.0
 
 ip ospf 1 area 0
 
 
 no shutdown
!

interface GigabitEthernet1/0
 no ip address
 ip address 10.2.13.1 255.255.255.0
 
 ip ospf 1 area 0
 
 
 no shutdown
!

interface GigabitEthernet3/0
 no ip address
 ip address 10.2.13.3 255.255.255.0
 
 ip ospf 1 area 0
 
 
 no shutdown
!

!
router ospf 1
 router-id 13.13.13.13
 passive-interface Loopback0
 
 redistribute bgp 2 route-map BGP_TO_OSPF subnets
 
!
router bgp 2
 bgp router-id 13.13.13.13
 bgp log-neighbor-changes
 !
 
 neighbor 10.255.2.7 remote-as 2
 neighbor 10.255.2.7 description to_R7_peer
 
 neighbor 10.255.2.7 update-source Loopback0
 
 
 neighbor 10.255.2.9 remote-as 2
 neighbor 10.255.2.9 description to_R9_peer
 
 neighbor 10.255.2.9 update-source Loopback0
 
 
 neighbor 10.255.2.10 remote-as 2
 neighbor 10.255.2.10 description to_R10_peer
 
 neighbor 10.255.2.10 update-source Loopback0
 
 
 neighbor 10.255.2.11 remote-as 2
 neighbor 10.255.2.11 description to_R11_peer
 
 neighbor 10.255.2.11 update-source Loopback0
 
 
 neighbor 10.255.2.12 remote-as 2
 neighbor 10.255.2.12 description to_R12_peer
 
 neighbor 10.255.2.12 update-source Loopback0
 
 
 neighbor 10.255.2.14 remote-as 2
 neighbor 10.255.2.14 description to_R14_peer
 
 neighbor 10.255.2.14 update-source Loopback0
 
 
 !
 address-family ipv4
 
  neighbor 10.255.2.7 activate
  
  neighbor 10.255.2.7 next-hop-self
  
  
 
  neighbor 10.255.2.9 activate
  
  neighbor 10.255.2.9 next-hop-self
  
  
 
  neighbor 10.255.2.10 activate
  
  neighbor 10.255.2.10 next-hop-self
  
  
 
  neighbor 10.255.2.11 activate
  
  neighbor 10.255.2.11 next-hop-self
  
  
 
  neighbor 10.255.2.12 activate
  
  neighbor 10.255.2.12 next-hop-self
  
  
 
  neighbor 10.255.2.14 activate
  
  neighbor 10.255.2.14 next-hop-self
  
  
 
 
  ! Networks to advertise
  
  network 10.2.0.0/24
  
 
  network 10.255.2.13 mask 255.255.255.255
  redistribute connected
  
  redistribute ospf 1 route-map OSPF_TO_BGP
  
 exit-address-family
!

! Route-map to tag BGP routes redist into OSPF
route-map BGP_TO_OSPF permit 10
 set tag 2
!
! Route-map to filter OSPF routes (deny tagged routes)
route-map OSPF_TO_BGP deny 10
 match tag 2
!
route-map OSPF_TO_BGP permit 20
!


end
write memory
hostname CE2
!
ip cef

!

interface Loopback0
 no ip address
 ip address 10.255.2.1 255.255.255.255

!

interface FastEthernet0/0
 no ip address

 ip address 172.31.0.6 255.255.255.252


 no shutdown
!




router bgp 65101
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

 neighbor 172.31.0.5 remote-as 65000
 neighbor 172.31.0.5 description CE_to_PE2

 !
 address-family ipv4

	neighbor 172.31.0.5 activate


	network 10.255.2.1 mask 255.255.255.255

 exit-address-family
!

!
end
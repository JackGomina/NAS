hostname PE1
!
ip cef

mpls label protocol ldp
mpls ldp router-id Loopback0 force

!

ip vrf CUST_00ff00
 rd 65000:1
 route-target export 65000:1
 route-target import 65000:1
!

ip vrf CUST_ff0000
 rd 65000:2
 route-target export 65000:2
 route-target import 65000:2
!

interface Loopback0
 no ip address
 ip address 10.255.0.1 255.255.255.255

 ip ospf 1 area 0

!

interface GigabitEthernet1/0
 no ip address

 ip address 172.16.0.1 255.255.255.252

 ip ospf 1 area 0


 mpls ip

 no shutdown
!

interface FastEthernet0/0
 no ip address

 ip vrf forwarding CUST_00ff00

 ip address 172.31.0.1 255.255.255.252


 no shutdown
!

interface GigabitEthernet2/0
 no ip address

 ip vrf forwarding CUST_ff0000

 ip address 172.31.0.10 255.255.255.252


 no shutdown
!


router ospf 1
 router-id 10.255.0.1
 passive-interface Loopback0
!


router bgp 65000
 bgp router-id 10.255.0.1
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

 neighbor 10.255.0.2 remote-as 65000
 neighbor 10.255.0.2 description RR_VPNV4_to_P1
 neighbor 10.255.0.2 update-source Loopback0

 !
 address-family vpnv4

	neighbor 10.255.0.2 activate
	neighbor 10.255.0.2 send-community extended


 exit-address-family

 !
 address-family ipv4 vrf CUST_00ff00
	neighbor 172.31.0.2 remote-as 65100
	neighbor 172.31.0.2 activate
	neighbor 172.31.0.2 as-override
 exit-address-family

 !
 address-family ipv4 vrf CUST_ff0000
	neighbor 172.31.0.9 remote-as 65101
	neighbor 172.31.0.9 activate
	neighbor 172.31.0.9 as-override
 exit-address-family

!


!
end
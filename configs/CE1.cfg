hostname CE1
!
ip cef

!

interface Loopback0
 no ip address
 ip address 10.255.1.1 255.255.255.255

!

interface FastEthernet0/0
 no ip address

 ip address 172.31.0.2 255.255.255.252


 no shutdown
!




router bgp 65100
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

 neighbor 172.31.0.1 remote-as 65000
 neighbor 172.31.0.1 description CE_to_PE1

 !
 address-family ipv4

	neighbor 172.31.0.1 activate


	network 10.255.1.1 mask 255.255.255.255

 exit-address-family
!

!
end